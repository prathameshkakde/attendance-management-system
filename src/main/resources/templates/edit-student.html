<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Student</title>
</head>
<body>

<h2>Edit Student</h2>

<form th:action="@{'/students/update/' + ${student.id}}" method="post">

    Name:
    <input type="text" name="name" th:value="${student.name}" required /><br><br>

    Email:
    <input type="email" name="email" th:value="${student.email}" required /><br><br>

    <button type="submit">Update</button>
</form>

</body>
</html>
