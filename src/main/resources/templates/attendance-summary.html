<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Attendance Summary</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial;
            margin: 0;
            background-color: #f4f6f8;
        }

        .container {
            padding: 30px;
        }

        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 200px;
            padding: 25px;
            border-radius: 12px;
            color: white;
            text-align: center;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .card p {
            font-size: 28px;
            font-weight: bold;
        }

        .present {
            background: #22c55e;
        }

        .absent {
            background: #ef4444;
        }

        .percentage {
            background: #3b82f6;
        }
    </style>
</head>

<body>

<!-- ✅ Navbar Fragment -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">

    <h2 style="margin-bottom: 20px;">Attendance Dashboard</h2>

    <div class="cards">

        <!-- Present Card -->
        <div class="card present">
            <h3>Present</h3>
            <p th:text="${summary.totalPresent}"></p>
        </div>

        <!-- Absent Card -->
        <div class="card absent">
            <h3>Absent</h3>
            <p th:text="${summary.totalAbsent}"></p>
        </div>

        <!-- Percentage Card -->
        <div class="card percentage">
            <h3>Percentage</h3>
            <p>
                <span th:text="${summary.percentage}"></span>%
            </p>
        </div>

    </div>

</div>

</body>
</html>
