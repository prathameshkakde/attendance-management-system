<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Attendance Summary</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f4f4f4;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            margin: auto;
        }

        h2 {
            color: #333;
        }

        p {
            font-size: 18px;
        }
    </style>
</head>

<body>

<!-- ✅ Navbar Fragment -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <div class="card">
        <h2>Attendance Summary</h2>

        <p>Total Present: <span th:text="${summary.totalPresent}"></span></p>
        <p>Total Absent: <span th:text="${summary.totalAbsent}"></span></p>
        <p>Percentage: <span th:text="${summary.percentage}"></span>%</p>
    </div>
</div>

</body>
</html>
